<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1A14"/>
      <stop offset="100%" stop-color="#14110C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A63E"/>
      <stop offset="50%" stop-color="#E8C56A"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0%" stop-color="#B8922E" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#B8922E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Organ pipe vertical lines -->
  <g stroke="#B8922E" stroke-opacity="0.10">
    <line x1="60" y1="0" x2="60" y2="630" stroke-width="2"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke-width="4"/>
    <line x1="145" y1="0" x2="145" y2="630" stroke-width="7"/>
    <line x1="196" y1="0" x2="196" y2="630" stroke-width="11"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke-width="2"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke-width="4"/>
    <line x1="1055" y1="0" x2="1055" y2="630" stroke-width="7"/>
    <line x1="1004" y1="0" x2="1004" y2="630" stroke-width="11"/>
  </g>

  <!-- Staff lines -->
  <g stroke="#FAF6F0" stroke-opacity="0.12" stroke-width="2">
    <line x1="300" y1="430" x2="900" y2="430"/>
    <line x1="300" y1="446" x2="900" y2="446"/>
    <line x1="300" y1="462" x2="900" y2="462"/>
    <line x1="300" y1="478" x2="900" y2="478"/>
    <line x1="300" y1="494" x2="900" y2="494"/>
  </g>

  <!-- Notes in voice colors: gold (soprano), burgundy (alto), green (tenor), steel blue (bass) -->
  <g>
    <ellipse cx="380" cy="438" rx="11" ry="8" fill="#D4A63E" transform="rotate(-18 380 438)"/>
    <rect x="389" y="398" width="2.6" height="38" fill="#D4A63E"/>
    <ellipse cx="500" cy="462" rx="11" ry="8" fill="#9E3A4C" transform="rotate(-18 500 462)"/>
    <rect x="509" y="422" width="2.6" height="38" fill="#9E3A4C"/>
    <ellipse cx="620" cy="454" rx="11" ry="8" fill="#5E8C61" transform="rotate(-18 620 454)"/>
    <rect x="629" y="414" width="2.6" height="38" fill="#5E8C61"/>
    <ellipse cx="740" cy="486" rx="11" ry="8" fill="#5C7A99" transform="rotate(-18 740 486)"/>
    <rect x="749" y="446" width="2.6" height="38" fill="#5C7A99"/>
    <ellipse cx="850" cy="446" rx="11" ry="8" fill="#D4A63E" transform="rotate(-18 850 446)"/>
    <rect x="859" y="406" width="2.6" height="38" fill="#D4A63E"/>
  </g>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Times New Roman, Georgia, serif" font-size="92" font-weight="bold" fill="url(#gold)" letter-spacing="2">MIDI Sketch Bach</text>

  <!-- Divider -->
  <line x1="430" y1="285" x2="770" y2="285" stroke="#B8922E" stroke-opacity="0.55" stroke-width="1.5"/>
  <circle cx="600" cy="285" r="4" fill="#D4A63E"/>

  <!-- Subtitle -->
  <text x="600" y="338" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#FAF6F0" fill-opacity="0.88" letter-spacing="1">Algorithmic Bach Instrumental MIDI Generator</text>

  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#B8922E" fill-opacity="0.85" letter-spacing="1.5">bach.midi-sketch.libraz.net</text>
</svg>
